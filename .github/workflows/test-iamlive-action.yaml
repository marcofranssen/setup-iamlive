name: Test iamlive action
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-dist:
    name: Check dist
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Setup pnpm
        run: npm install --location=global pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check diff is up to date
        run: |
          pnpm build
          git diff --quiet -- dist || {
            echo "::error::The ./dist is outdated, run 'pnpm build' and commit"
            exit 1
          }

  utilize:
    name: Use iamlive action
    runs-on: ubuntu-24.04

    needs: [check-dist]

    permissions:
      contents: read

    env:
      AWS_CSM_ENABLED: "true"
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    strategy:
      fail-fast: true
      matrix:
        iamliveVersion: [v1.1.15, v1.1.28]

    steps:
      - name: Check out code
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Setup iamlive
        id: setup-iamlive
        uses: ./
        with:
          iamlive-version: ${{ matrix.iamliveVersion }}
          auto-capture: true
          output-file: ./test-policy-${{ matrix.iamliveVersion }}.json

      - name: Check output and installPath
        run: |
          [ "${IAMLIVE_VERSION}" == ${{ matrix.iamliveVersion }} ] || { echo >&2 "::error::Expected ${{ matrix.iamliveVersion }} to be installed."; exit 1; }
          hash iamlive 2>/dev/null || { echo >&2 "iamlive can not be found in the PATH."; exit 1; }

          echo "::notice::Installed iamlive ${IAMLIVE_VERSION} at $(which iamlive)"
        env:
          IAMLIVE_VERSION: ${{ steps.setup-iamlive.outputs.iamlive-version }}

      - name: Check AWS CLI
        run: |
          aws --version

      - name: Start stub S3 endpoint
        run: |
          node --input-type=module <<'NODE' >s3-stub.log 2>&1 &
          import http from "node:http";

          const listBucketsXml = `<?xml version="1.0" encoding="UTF-8"?>
          <ListAllMyBucketsResult xmlns="http://s3.amazonaws.com/doc/2006-03-01/">
            <Owner>
              <ID>stub-owner</ID>
              <DisplayName>stub-owner</DisplayName>
            </Owner>
            <Buckets>
              <Bucket>
                <Name>test</Name>
                <CreationDate>2026-06-29T00:00:00.000Z</CreationDate>
              </Bucket>
            </Buckets>
          </ListAllMyBucketsResult>`;

          function sendXml(res, statusCode, body = "") {
            res.writeHead(statusCode, {
              "content-type": "application/xml",
              "content-length": Buffer.byteLength(body),
            });
            res.end(body);
          }

          const server = http.createServer((req, res) => {
            req.resume();
            req.on("end", () => {
              console.log(`${req.method} ${req.url}`);

              if (req.method === "PUT" && /^\/test\/?$/.test(req.url ?? "")) {
                sendXml(res, 200);
                return;
              }

              if (req.method === "GET" && (req.url === "/" || req.url?.startsWith("/?"))) {
                sendXml(res, 200, listBucketsXml);
                return;
              }

              sendXml(res, 404, "<Error><Code>NoSuchBucket</Code></Error>");
            });
          });

          process.on("SIGTERM", () => server.close(() => process.exit(0)));
          server.listen(4566, "127.0.0.1");
          NODE

          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4566/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat s3-stub.log
          echo "::error::Stub S3 endpoint did not start"
          exit 1

      - name: Call a bunch of aws apis
        run: |
          aws --endpoint-url http://127.0.0.1:4566 s3 mb s3://test
          aws --endpoint-url http://127.0.0.1:4566 s3 ls

      - name: Is iamlive still running
        run: ps aux | grep iamlive

  assert:
    name: Assert policy
    runs-on: ubuntu-24.04

    needs: [utilize]

    strategy:
      fail-fast: true
      matrix:
        iamliveVersion: [v1.1.15, v1.1.28]

    steps:
      - name: download-policy
        uses: actions/download-artifact@v8.0.1
        with:
          name: test-policy-${{ matrix.iamliveVersion }}.json

      - name: check-policy
        run: |
          echo "assert policy has file"
          cat test-policy-${{ matrix.iamliveVersion }}.json
          cat test-policy-${{ matrix.iamliveVersion }}.json | grep 's3:CreateBucket'
          cat test-policy-${{ matrix.iamliveVersion }}.json | grep 's3:ListAllMyBuckets'
